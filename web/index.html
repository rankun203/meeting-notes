<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meeting Notes</title>
  <link rel="preconnect" href="https://esm.sh" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'media',
    }
  </script>
  <style>
    @keyframes pulse-recording { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .animate-pulse-recording { animation: pulse-recording 1.5s ease-in-out infinite; }
    audio::-webkit-media-controls-panel { background: transparent; }
    .sidebar-scroll::-webkit-scrollbar { width: 4px; }
    .sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
    .sidebar-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
    @media (prefers-color-scheme: dark) {
      .sidebar-scroll::-webkit-scrollbar-thumb { background: #374151; }
    }
  </style>
</head>
<body class="h-full bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 antialiased overflow-hidden">
  <div id="root" class="h-full">
    <div id="loading" class="flex items-center justify-center h-full text-gray-400 dark:text-gray-600 text-sm">Loading libraries from esm.sh&hellip;</div>
  </div>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@19",
        "react-dom/client": "https://esm.sh/react-dom@19/client",
        "react/jsx-runtime": "https://esm.sh/react@19/jsx-runtime"
      }
    }
  </script>
  <script type="module">
    import { useState, useEffect, useCallback, useMemo, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { jsx as _jsx, jsxs as _jsxs, Fragment } from 'react/jsx-runtime';

    // Wrappers that extract 'key' from props to avoid React 19 warning,
    // and filter falsy children (jsx-runtime doesn't do this unlike JSX transpilation).
    function jsx(type, props, key) {
      const { key: k, ...rest } = props;
      return _jsx(type, rest, key ?? k);
    }
    function jsxs(type, props, key) {
      const { key: k, ...rest } = props;
      const finalKey = key ?? k;
      if (rest.children && Array.isArray(rest.children)) {
        const filtered = rest.children.filter(c => c != null && c !== false);
        if (filtered.length === 0) {
          const { children, ...noChildren } = rest;
          return _jsx(type, noChildren, finalKey);
        }
        if (filtered.length === 1) {
          return _jsx(type, { ...rest, children: filtered[0] }, finalKey);
        }
        return _jsxs(type, { ...rest, children: filtered }, finalKey);
      }
      return _jsxs(type, rest, finalKey);
    }

    const API = window.location.origin;
    const PAGE_SIZE = 50;

    async function api(path, opts = {}) {
      const res = await fetch(`${API}${path}`, {
        headers: { 'Content-Type': 'application/json' },
        ...opts,
      });
      if (!res.ok && res.status !== 204) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.error || `HTTP ${res.status}`);
      }
      if (res.status === 204) return null;
      return res.json();
    }

    function useIsMobile() {
      const [mobile, setMobile] = useState(window.innerWidth < 768);
      useEffect(() => {
        const mq = window.matchMedia('(max-width: 767px)');
        const handler = (e) => setMobile(e.matches);
        mq.addEventListener('change', handler);
        return () => mq.removeEventListener('change', handler);
      }, []);
      return mobile;
    }

    function useWebSocket(onEvent) {
      const wsRef = useRef(null);
      const reconnectRef = useRef(null);
      const onEventRef = useRef(onEvent);
      onEventRef.current = onEvent;

      useEffect(() => {
        function connect() {
          const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
          const ws = new WebSocket(`${protocol}//${location.host}/ws`);
          wsRef.current = ws;
          ws.onmessage = (e) => {
            try { onEventRef.current(JSON.parse(e.data)); } catch {}
          };
          ws.onclose = () => {
            reconnectRef.current = setTimeout(connect, 2000);
          };
          ws.onerror = () => ws.close();
        }
        connect();
        return () => {
          if (wsRef.current) wsRef.current.close();
          if (reconnectRef.current) clearTimeout(reconnectRef.current);
        };
      }, []);
    }

    function formatFileSize(bytes) {
      if (bytes == null) return '';
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
    }

    function formatDuration(secs) {
      if (secs == null || secs < 0) return '';
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      const s = Math.floor(secs % 60);
      if (h > 0) return `${h}h ${m}m ${s}s`;
      if (m > 0) return `${m}m ${s}s`;
      return `${s}s`;
    }

    // ── Icons ──

    function ChevronIcon({ open }) {
      return jsx('svg', {
        xmlns: 'http://www.w3.org/2000/svg', viewBox: '0 0 20 20', fill: 'currentColor',
        className: `w-3.5 h-3.5 transition-transform ${open ? 'rotate-90' : ''}`,
        children: jsx('path', {
          fillRule: 'evenodd', clipRule: 'evenodd',
          d: 'M7.21 14.77a.75.75 0 01.02-1.06L11.168 10 7.23 6.29a.75.75 0 111.04-1.08l4.5 4.25a.75.75 0 010 1.08l-4.5 4.25a.75.75 0 01-1.06-.02z',
        }),
      });
    }

    const PlusIcon = () => jsx('svg', {
      xmlns: 'http://www.w3.org/2000/svg', viewBox: '0 0 20 20', fill: 'currentColor', className: 'w-4 h-4',
      children: jsx('path', { d: 'M10.75 4.75a.75.75 0 00-1.5 0v4.5h-4.5a.75.75 0 000 1.5h4.5v4.5a.75.75 0 001.5 0v-4.5h4.5a.75.75 0 000-1.5h-4.5v-4.5z' }),
    });

    const CloseIcon = () => jsx('svg', {
      xmlns: 'http://www.w3.org/2000/svg', viewBox: '0 0 20 20', fill: 'currentColor', className: 'w-4 h-4',
      children: jsx('path', { d: 'M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z' }),
    });

    const MenuIcon = () => jsx('svg', {
      xmlns: 'http://www.w3.org/2000/svg', viewBox: '0 0 20 20', fill: 'currentColor', className: 'w-5 h-5',
      children: jsx('path', {
        fillRule: 'evenodd', clipRule: 'evenodd',
        d: 'M2 4.75A.75.75 0 012.75 4h14.5a.75.75 0 010 1.5H2.75A.75.75 0 012 4.75zm0 5A.75.75 0 012.75 9h14.5a.75.75 0 010 1.5H2.75A.75.75 0 012 9.75zm0 5a.75.75 0 01.75-.75h14.5a.75.75 0 010 1.5H2.75a.75.75 0 01-.75-.75z',
      }),
    });

    const BackIcon = () => jsx('svg', {
      xmlns: 'http://www.w3.org/2000/svg', viewBox: '0 0 20 20', fill: 'currentColor', className: 'w-5 h-5',
      children: jsx('path', {
        fillRule: 'evenodd', clipRule: 'evenodd',
        d: 'M17 10a.75.75 0 01-.75.75H5.612l4.158 3.96a.75.75 0 11-1.04 1.08l-5.5-5.25a.75.75 0 010-1.08l5.5-5.25a.75.75 0 011.04 1.08L5.612 9.25H16.25A.75.75 0 0117 10z',
      }),
    });

    const PlayIcon = () => jsx('svg', {
      xmlns: 'http://www.w3.org/2000/svg', viewBox: '0 0 20 20', fill: 'currentColor', className: 'w-4 h-4',
      children: jsx('path', { d: 'M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z' }),
    });

    const StopIcon = () => jsx('svg', {
      xmlns: 'http://www.w3.org/2000/svg', viewBox: '0 0 20 20', fill: 'currentColor', className: 'w-4 h-4',
      children: jsx('path', {
        fillRule: 'evenodd', clipRule: 'evenodd',
        d: 'M2 10a8 8 0 1116 0 8 8 0 01-16 0zm5-2.25A.75.75 0 017.75 7h4.5a.75.75 0 01.75.75v4.5a.75.75 0 01-.75.75h-4.5a.75.75 0 01-.75-.75v-4.5z',
      }),
    });

    // ── Helpers ──

    function StateBadge({ state, small }) {
      const styles = {
        created: 'bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300',
        recording: 'bg-red-100 text-red-700 dark:bg-red-900/40 dark:text-red-300 animate-pulse-recording',
        stopped: 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300',
      };
      const size = small ? 'px-1.5 py-0 text-[10px]' : 'px-2 py-0.5 text-xs';
      return jsx('span', {
        className: `inline-flex items-center rounded-full font-medium ${size} ${styles[state] || ''}`,
        children: state,
      });
    }

    function formatTime(iso) {
      const d = new Date(iso);
      const now = new Date();
      const diff = now - d;
      if (diff < 60000) return 'just now';
      if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
      if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
      if (d.getFullYear() === now.getFullYear()) {
        return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
      }
      return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function typeBadgeColor(type) {
      const c = {
        mic: 'bg-violet-100 text-violet-600 dark:bg-violet-900/30 dark:text-violet-400',
        system_mix: 'bg-cyan-100 text-cyan-600 dark:bg-cyan-900/30 dark:text-cyan-400',
        app: 'bg-orange-100 text-orange-600 dark:bg-orange-900/30 dark:text-orange-400',
      };
      return c[type] || 'bg-gray-100 text-gray-600 dark:bg-gray-800 dark:text-gray-400';
    }

    const INPUT_CLS = 'w-full rounded-md border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 px-2.5 py-1.5 text-sm text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-1 focus:ring-blue-500 transition-colors';
    const LABEL_CLS = 'block text-[11px] font-medium text-gray-400 dark:text-gray-500 mb-0.5 uppercase tracking-wider';

    // ── Sidebar Session Item ──

    function SidebarItem({ session, selected, onClick }) {
      const s = session;
      return jsx('button', {
        onClick,
        className: [
          'w-full text-left px-3 py-2.5 rounded-lg transition-colors',
          selected
            ? 'bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800'
            : 'hover:bg-gray-100 dark:hover:bg-gray-800/60 border border-transparent',
        ].join(' '),
        children: jsxs('div', { className: 'flex items-center justify-between gap-2', children: [
          jsxs('div', { className: 'min-w-0 flex-1', children: [
            jsxs('div', { className: 'flex items-center gap-2', children: [
              s.name
                ? jsx('span', {
                    className: `text-xs font-medium truncate ${selected ? 'text-blue-700 dark:text-blue-300' : 'text-gray-700 dark:text-gray-300'}`,
                    children: s.name,
                  })
                : jsx('code', {
                    className: `text-xs font-mono ${selected ? 'text-blue-700 dark:text-blue-300' : 'text-gray-500 dark:text-gray-400'}`,
                    children: s.id,
                  }),
              jsx(StateBadge, { state: s.state, small: true }),
            ]}),
            jsx('p', {
              className: 'text-[11px] text-gray-400 dark:text-gray-500 mt-0.5',
              children: s.duration_secs != null
                ? `${formatDuration(s.duration_secs)} · ${formatTime(s.updated_at || s.created_at)}`
                : formatTime(s.updated_at || s.created_at),
            }),
          ]}),
          s.state === 'recording' && jsx('span', {
            className: 'w-2 h-2 rounded-full bg-red-500 animate-pulse-recording flex-shrink-0',
          }),
        ]}),
      });
    }

    // ── New Session Form ──

    function NewSessionPanel({ sources: availableSources, fields, onCreated, onSelect }) {
      // Initialize field values from backend defaults
      const fieldEntries = useMemo(() => Object.entries(fields || {}), [fields]);
      const initVals = useMemo(() => {
        const v = {};
        for (const [k, f] of fieldEntries) v[k] = f.default ?? '';
        return v;
      }, [fieldEntries]);

      const [vals, setVals] = useState(initVals);
      const [selectedSources, setSelectedSources] = useState([]);
      const [showAdvanced, setShowAdvanced] = useState(false);
      const [error, setError] = useState(null);
      const [creating, setCreating] = useState(false);

      // Re-init when fields arrive from backend
      useEffect(() => { if (fieldEntries.length) setVals(initVals); }, [initVals]);

      useEffect(() => {
        if (availableSources.length > 0 && selectedSources.length === 0) {
          setSelectedSources(availableSources.filter(s => s.default_selected).map(s => s.id));
        }
      }, [availableSources]);

      function setVal(key, value) { setVals(prev => ({ ...prev, [key]: value })); }
      function toggleSource(id) {
        setSelectedSources(prev =>
          prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]
        );
      }

      // Check if a field should be visible given current values
      function isVisible(f) {
        if (!f.show_when) return true;
        return vals[f.show_when.field] === f.show_when.value;
      }

      // Build request body, mapping config_path fields into nested objects
      function buildBody() {
        const body = { sources: selectedSources };
        for (const [key, f] of fieldEntries) {
          const v = vals[key];
          if (v === '' && f.type !== 'text') continue;
          if (f.config_path) {
            const parts = f.config_path.split('.');
            let obj = body;
            for (let i = 0; i < parts.length - 1; i++) {
              if (!obj[parts[i]]) obj[parts[i]] = {};
              obj = obj[parts[i]];
            }
            obj[parts[parts.length - 1]] = typeof f.default === 'number' ? Number(v) : v;
          } else {
            body[key] = typeof f.default === 'number' ? Number(v) : v;
          }
        }
        return body;
      }

      async function create() {
        setError(null);
        setCreating(true);
        try {
          const session = await api('/sessions', { method: 'POST', body: JSON.stringify(buildBody()) });
          if (session && session.id) {
            // Auto-start recording
            try {
              await api(`/sessions/${session.id}/recording/start`, { method: 'POST' });
            } catch (e) {
              setError(`Created but failed to start recording: ${e.message}`);
            }
            await onCreated();
            onSelect(session.id);
          }
        } catch (e) { setError(e.message); }
        finally { setCreating(false); }
      }

      // Render a single config field
      function renderField(key, f) {
        if (!isVisible(f)) return null;
        const label = jsx('label', { className: LABEL_CLS, title: f.description, children: f.label });
        let input;
        if (f.type === 'select') {
          input = jsxs('select', {
            value: vals[key],
            onChange: e => setVal(key, typeof f.default === 'number' ? Number(e.target.value) : e.target.value),
            className: INPUT_CLS, title: f.description,
            children: (f.options || []).map(o => jsx('option', { key: o.value, value: o.value, title: o.title || '', children: o.label })),
          });
        } else if (f.type === 'textarea') {
          input = jsx('textarea', {
            value: vals[key], onChange: e => setVal(key, e.target.value),
            placeholder: f.placeholder || '', className: INPUT_CLS + ' resize-y min-h-[48px]', rows: 2,
            title: f.description,
          });
        } else {
          input = jsx('input', {
            value: vals[key], onChange: e => setVal(key, e.target.value),
            placeholder: f.placeholder || f.default || '', className: INPUT_CLS,
            title: f.description,
          });
        }
        return jsxs('div', { key, children: [label, input] });
      }

      // Split fields into basic and advanced
      const basicFields = fieldEntries.filter(([, f]) => !f.advanced);
      const advancedFields = fieldEntries.filter(([, f]) => f.advanced);
      const visibleAdvanced = advancedFields.filter(([, f]) => isVisible(f));

      return jsxs('div', { className: 'space-y-3', children: [
        jsx('div', { className: `grid grid-cols-${Math.min(basicFields.length, 2)} gap-2`,
          children: basicFields.map(([k, f]) => renderField(k, f)),
        }),
        jsxs('div', { children: [
          jsx('label', { className: LABEL_CLS, children: 'Sources' }),
          jsx('div', { className: 'space-y-0.5', children:
            availableSources.map(s => jsx('label', {
              key: s.id,
              className: 'flex items-center gap-2 py-1 px-1.5 rounded hover:bg-gray-100 dark:hover:bg-gray-800/50 cursor-pointer transition-colors',
              children: jsxs(Fragment, { children: [
                jsx('input', {
                  type: 'checkbox',
                  checked: selectedSources.includes(s.id),
                  onChange: () => toggleSource(s.id),
                  className: 'rounded border-gray-300 dark:border-gray-600 text-blue-600 focus:ring-blue-500/40 h-3.5 w-3.5',
                }),
                jsx('span', { className: 'text-xs text-gray-700 dark:text-gray-300 flex-1 truncate', children: s.label }),
                jsx('span', {
                  className: `text-[9px] font-medium px-1 py-0 rounded-full ${typeBadgeColor(s.source_type)}`,
                  children: s.source_type === 'system_mix' ? 'sys' : s.source_type,
                }),
              ]}),
            })),
          }),
        ]}),
        visibleAdvanced.length > 0 && jsx('button', {
          className: 'flex items-center gap-1 text-[11px] text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300 transition-colors',
          onClick: () => setShowAdvanced(!showAdvanced),
          children: jsxs(Fragment, { children: [jsx(ChevronIcon, { open: showAdvanced }), 'Advanced'] }),
        }),
        showAdvanced && jsx('div', { className: 'space-y-2',
          children: advancedFields.map(([k, f]) => renderField(k, f)),
        }),
        jsx('button', {
          onClick: create, disabled: creating,
          className: 'w-full flex justify-center items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium text-white bg-red-500 hover:bg-red-600 disabled:opacity-50 transition-colors',
          children: creating ? 'Starting...' : jsxs(Fragment, { children: [
            jsx('svg', {
              xmlns: 'http://www.w3.org/2000/svg', viewBox: '0 0 24 24', fill: 'currentColor', className: 'w-4 h-4',
              children: jsx('circle', { cx: '12', cy: '12', r: '8' }),
            }),
            'Start Recording',
          ]}),
        }),
        error && jsx('p', { className: 'text-xs text-red-500', children: error }),
      ]});
    }

    // ── Synced Audio Player ──

    function SyncedPlayer({ files, sessionId }) {
      const audioRefs = useRef([]);
      const seekRef = useRef(null);
      const [playing, setPlaying] = useState(false);
      const [currentTime, setCurrentTime] = useState(0);
      const [duration, setDuration] = useState(0);
      const [mutedTracks, setMutedTracks] = useState({});
      const rafRef = useRef(null);
      const playingRef = useRef(false);

      // Keep refs array sized to files
      useEffect(() => {
        audioRefs.current = audioRefs.current.slice(0, files.length);
        setPlaying(false);
        playingRef.current = false;
        setCurrentTime(0);
        setDuration(0);
      }, [files.length, sessionId]);

      function getAudios() {
        return audioRefs.current.filter(Boolean);
      }

      function onLoadedMetadata() {
        const maxDur = Math.max(...getAudios().map(a => a.duration || 0));
        if (maxDur > 0) setDuration(maxDur);
      }

      function updateTime() {
        const audios = getAudios();
        if (audios.length > 0) {
          setCurrentTime(audios[0].currentTime || 0);
        }
        if (playingRef.current) rafRef.current = requestAnimationFrame(updateTime);
      }

      function togglePlay() {
        const audios = getAudios();
        if (playing) {
          audios.forEach(a => a.pause());
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
          setPlaying(false);
          playingRef.current = false;
        } else {
          // Sync all to the same time before playing
          const t = audios[0]?.currentTime || 0;
          audios.forEach(a => { a.currentTime = t; a.play(); });
          setPlaying(true);
          playingRef.current = true;
          rafRef.current = requestAnimationFrame(updateTime);
        }
      }

      function onSeekInput(e) {
        const t = parseFloat(e.target.value);
        setCurrentTime(t);
        getAudios().forEach(a => { a.currentTime = t; });
      }

      function stopAll() {
        const audios = getAudios();
        audios.forEach(a => { a.pause(); a.currentTime = 0; });
        if (rafRef.current) cancelAnimationFrame(rafRef.current);
        setPlaying(false);
        playingRef.current = false;
        setCurrentTime(0);
      }

      function toggleMute(idx) {
        setMutedTracks(prev => {
          const next = { ...prev, [idx]: !prev[idx] };
          if (audioRefs.current[idx]) audioRefs.current[idx].muted = next[idx];
          return next;
        });
      }

      // Handle audio ending
      function onEnded() {
        const audios = getAudios();
        if (audios.every(a => a.ended || a.currentTime >= a.duration - 0.1)) {
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
          audios.forEach(a => { a.pause(); a.currentTime = 0; });
          setPlaying(false);
          playingRef.current = false;
          setCurrentTime(0);
        }
      }

      // Cleanup on unmount
      useEffect(() => {
        return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
      }, []);

      function fmtTime(s) {
        if (!s || !isFinite(s)) return '0:00';
        const m = Math.floor(s / 60);
        const sec = Math.floor(s % 60);
        return `${m}:${sec.toString().padStart(2, '0')}`;
      }

      return jsxs('div', { className: 'space-y-2', children: [
        // Hidden audio elements
        ...files.map((f, i) => {
          const src = `${API}/sessions/${sessionId}/files/${encodeURIComponent(f.name)}`;
          return jsx('audio', {
            key: f.name,
            ref: el => { audioRefs.current[i] = el; },
            src,
            preload: 'metadata',
            muted: !!mutedTracks[i],
            onLoadedMetadata,
            onEnded,
            className: 'hidden',
          });
        }),

        // Controls bar
        jsxs('div', { className: 'flex items-center gap-3', children: [
          // Play/Pause button
          jsx('button', {
            onClick: togglePlay,
            className: 'w-9 h-9 flex items-center justify-center rounded-full bg-blue-600 hover:bg-blue-700 text-white transition-colors flex-shrink-0',
            title: playing ? 'Pause all' : 'Play all',
            children: playing
              ? jsx('svg', { xmlns: 'http://www.w3.org/2000/svg', viewBox: '0 0 20 20', fill: 'currentColor', className: 'w-4 h-4',

    // ── Speaker colors ──
    const SPEAKER_COLORS = [
      'bg-violet-100 text-violet-700 dark:bg-violet-900/30 dark:text-violet-300',
      'bg-cyan-100 text-cyan-700 dark:bg-cyan-900/30 dark:text-cyan-300',
      'bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-300',
      'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-300',
      'bg-rose-100 text-rose-700 dark:bg-rose-900/30 dark:text-rose-300',
      'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-300',
      'bg-orange-100 text-orange-700 dark:bg-orange-900/30 dark:text-orange-300',
      'bg-teal-100 text-teal-700 dark:bg-teal-900/30 dark:text-teal-300',
    ];

    function speakerColor(speaker) {
      if (!speaker) return 'bg-gray-100 text-gray-500 dark:bg-gray-800 dark:text-gray-400';
      let hash = 0;
      for (let i = 0; i < speaker.length; i++) hash = ((hash << 5) - hash + speaker.charCodeAt(i)) | 0;
      return SPEAKER_COLORS[Math.abs(hash) % SPEAKER_COLORS.length];
    }

    function fmtTimestamp(secs) {
      if (secs == null || !isFinite(secs)) return '0:00';
      const m = Math.floor(secs / 60);
      const s = Math.floor(secs % 60);
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    // ── Transcript Viewer ──

    function TranscriptViewer({ sessionId, onSeek, onSpeakerUpdate }) {
      const [transcript, setTranscript] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [people, setPeople] = useState([]);
      const [editingSpeaker, setEditingSpeaker] = useState(null);
      const [newName, setNewName] = useState('');

      function reload() {
        api(`/sessions/${sessionId}/transcript`)
          .then(data => { setTranscript(data); })
          .catch(() => {});
        api('/people').then(d => setPeople(d.people || [])).catch(() => {});
      }

      useEffect(() => {
        setLoading(true);
        setError(null);
        Promise.all([
          api(`/sessions/${sessionId}/transcript`),
          api('/people'),
        ]).then(([t, p]) => {
          setTranscript(t);
          setPeople(p.people || []);
          setLoading(false);
        }).catch(e => { setError(e.message); setLoading(false); });
      }, [sessionId]);

      async function assignSpeaker(speaker, action, personId, name) {
        try {
          await api(`/sessions/${sessionId}/attribution`, {
            method: 'POST',
            body: JSON.stringify({ attributions: [{ speaker, action, person_id: personId, name }] }),
          });
          setEditingSpeaker(null);
          setNewName('');
          reload();
          if (onSpeakerUpdate) onSpeakerUpdate();
        } catch (e) { alert(`Failed: ${e.message}`); }
      }

      if (loading) return jsx('div', { className: 'text-sm text-gray-400 py-4 text-center', children: 'Loading transcript...' });
      if (error) return jsx('div', { className: 'text-sm text-red-500 py-4', children: `Error: ${error}` });
      if (!transcript || !transcript.segments || transcript.segments.length === 0) {
        return jsx('div', { className: 'text-sm text-gray-400 py-4 text-center', children: 'No transcript segments' });
      }

      const segments = transcript.segments;
      return jsx('div', { className: 'space-y-1', children:
        segments.map((seg, i) => {
          const speaker = seg.person_name || seg.speaker || 'Unknown';
          const isUnconfirmed = !seg.person_id && seg.speaker;
          const isEditing = editingSpeaker === `${i}-${seg.speaker}`;

          return jsxs('div', {
            key: i,
            className: 'flex items-start gap-2 py-1.5 hover:bg-gray-50 dark:hover:bg-gray-800/30 rounded px-1 -mx-1 transition-colors',
            children: [
              jsx('button', {
                onClick: () => onSeek && onSeek(seg.start),
                className: 'text-[11px] font-mono text-blue-500 hover:text-blue-700 dark:text-blue-400 dark:hover:text-blue-300 w-12 flex-shrink-0 text-right pt-0.5 cursor-pointer',
                title: 'Click to seek',
                children: fmtTimestamp(seg.start),
              }),
              isEditing
                ? jsxs('div', {
                    className: 'flex flex-wrap items-center gap-1 flex-shrink-0',
                    children: [
                      jsx('input', {
                        type: 'text', placeholder: 'New name...', value: newName, autoFocus: true,
                        onChange: e => setNewName(e.target.value),
                        onKeyDown: e => {
                          if (e.key === 'Enter' && newName.trim()) assignSpeaker(seg.speaker, 'create', null, newName.trim());
                          if (e.key === 'Escape') setEditingSpeaker(null);
                        },
                        className: 'text-[11px] px-1.5 py-0.5 rounded border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 w-24',
                      }),
                      newName.trim() && jsx('button', {
                        onClick: () => assignSpeaker(seg.speaker, 'create', null, newName.trim()),
                        className: 'text-[10px] px-1.5 py-0.5 rounded bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400 hover:bg-blue-200',
                        children: 'Create',
                      }),
                      people.length > 0 && jsx('select', {
                        onChange: e => { if (e.target.value) assignSpeaker(seg.speaker, 'correct', e.target.value); },
                        className: 'text-[10px] px-1 py-0.5 rounded border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800',
                        children: [
                          jsx('option', { key: '', value: '', children: 'Assign...' }),
                          ...people.map(p => jsx('option', { key: p.id, value: p.id, children: p.name })),
                        ],
                      }),
                      jsx('button', {
                        onClick: () => setEditingSpeaker(null),
                        className: 'text-[10px] text-gray-400 hover:text-gray-600',
                        children: 'Cancel',
                      }),
                    ],
                  })
                : jsx('button', {
                    onClick: () => { setEditingSpeaker(`${i}-${seg.speaker}`); setNewName(''); },
                    className: `text-[10px] font-medium px-1.5 py-0.5 rounded-full flex-shrink-0 cursor-pointer hover:ring-2 hover:ring-blue-400 transition-all ${speakerColor(seg.speaker)} ${isUnconfirmed ? 'border border-dashed border-current' : ''}`,

            ],
          });
        }),
      });

    // ── Speaker Attribution Panel ──

    function SpeakerAttribution({ sessionId, transcript, onUpdate }) {
      const [people, setPeople] = useState([]);
      const [newNames, setNewNames] = useState({});
      const [busy, setBusy] = useState({});

      useEffect(() => {
        api('/people').then(d => setPeople(d.people || [])).catch(() => {});
      }, []);

      if (!transcript || !transcript.speaker_embeddings) return null;
      const speakers = Object.entries(transcript.speaker_embeddings);
      if (speakers.length === 0) return null;

      async function submitAttribution(speaker, action, personId, name) {
        setBusy(prev => ({ ...prev, [speaker]: true }));
        try {
          await api(`/sessions/${sessionId}/attribution`, {
            method: 'POST',
            body: JSON.stringify({ attributions: [{ speaker, action, person_id: personId, name }] }),
          });
          if (onUpdate) onUpdate();
          // Refresh people list
          api('/people').then(d => setPeople(d.people || [])).catch(() => {});
        } catch (e) {
          alert(`Attribution failed: ${e.message}`);
        } finally {
          setBusy(prev => ({ ...prev, [speaker]: false }));
        }
      }

      return jsxs('div', { className: 'space-y-2', children: [
        jsx('p', { className: 'text-[11px] uppercase tracking-wider text-gray-400 dark:text-gray-500', children: 'Speaker Attribution' }),
        ...speakers.map(([speaker, info]) => {
          const matched = info.person_id != null;
          const confidence = info.confidence != null ? Math.round(info.confidence * 100) : null;
          const isBusy = busy[speaker];

          return jsx('div', {
            key: speaker,
            className: 'flex items-center gap-2 py-1.5 px-2 rounded-lg bg-gray-50 dark:bg-gray-800/40',
            children: jsxs(Fragment, { children: [
              jsx('span', {
                className: `text-[10px] font-medium px-1.5 py-0.5 rounded-full flex-shrink-0 ${speakerColor(speaker)}`,

              }),
              matched
                ? jsxs(Fragment, { children: [
                    jsx('span', { className: 'text-sm text-gray-700 dark:text-gray-300 flex-1', children: info.person_name }),
                    confidence != null && jsx('span', { className: 'text-[11px] text-gray-400', children: `${confidence}%` }),
                    jsx('button', {
                      disabled: isBusy,
                      onClick: () => submitAttribution(speaker, 'confirm', info.person_id),
                      className: 'text-[11px] px-2 py-0.5 rounded bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400 hover:bg-emerald-200 dark:hover:bg-emerald-900/50 disabled:opacity-40',
                      children: 'Confirm',
                    }),
                    jsx('button', {
                      disabled: isBusy,
                      onClick: () => submitAttribution(speaker, 'reject'),
                      className: 'text-[11px] px-2 py-0.5 rounded bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400 hover:bg-red-200 dark:hover:bg-red-900/50 disabled:opacity-40',
                      children: 'Reject',

                    jsx('span', { className: 'text-sm text-gray-400 dark:text-gray-500 italic', children: 'Unknown' }),
                    jsx('input', {
                      type: 'text',
                      placeholder: 'Name...',
                      value: newNames[speaker] || '',
                      onChange: e => setNewNames(prev => ({ ...prev, [speaker]: e.target.value })),

    // ── Speaker Attribution Wrapper (fetches transcript for attribution panel) ──

    function SpeakerAttributionWrapper({ sessionId, onUpdate }) {
      const [transcript, setTranscript] = useState(null);
      useEffect(() => {
        api(`/sessions/${sessionId}/transcript`)
          .then(data => setTranscript(data))
          .catch(() => {});
      }, [sessionId]);

      function handleUpdate() {
        api(`/sessions/${sessionId}/transcript`)
          .then(data => setTranscript(data))
          .catch(() => {});
        if (onUpdate) onUpdate();
      }

      if (!transcript) return null;

      const hasEmbeddings = transcript.speaker_embeddings && Object.keys(transcript.speaker_embeddings).length > 0;
      // Collect unique speakers from segments if no embeddings
      const segmentSpeakers = !hasEmbeddings
        ? [...new Set((transcript.segments || []).map(s => s.speaker).filter(Boolean))]
        : [];

      if (!hasEmbeddings && segmentSpeakers.length === 0) {
        return jsx('div', {
          className: 'rounded-xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 p-4 md:p-5',
          children: jsx('p', { className: 'text-sm text-gray-400 dark:text-gray-500',
            children: 'No speakers identified in this recording.',
          }),
        });
      }

      return jsx('div', {
        className: 'rounded-xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 p-4 md:p-5',
        children: jsx(SpeakerAttribution, { sessionId, transcript, onUpdate: handleUpdate }),
      });
    }

                        jsxs('span', { className: 'flex items-center gap-2 flex-shrink-0', children: [
                          s.file_sizes && s.file_sizes[f] != null && jsx('span', {
                            className: 'text-[11px] text-gray-400 dark:text-gray-500 font-mono',
                            children: formatFileSize(s.file_sizes[f]),
                          }),
                          jsx('a', {
                            href: `${API}/sessions/${s.id}/files/${encodeURIComponent(f)}`,
                            target: '_blank',
                            className: 'text-xs text-blue-600 dark:text-blue-400 hover:underline',
                            children: 'download',
                          }),
                        ]}),
                      ],
                    })),
                  }),
                ]}),
              }),

              jsxs('p', {
                className: 'text-[11px] text-gray-300 dark:text-gray-700 font-mono break-all',
                children: ['ID: ', s.id],
              }),
            ]}),
          }),
        ]}),
      });
    }

    // ── Sidebar ──

    function Sidebar({ sessions, total, offset, selectedId, onSelect, onPageChange, sources, fields, onCreated, showNew, setShowNew, currentView, onViewChange, people, selectedPersonId, setSelectedPersonId, refreshPeople, settingsCategory, setSettingsCategory }) {
      const header = jsx('div', {
        key: 'header',
        className: 'flex-shrink-0 px-4 py-3 md:py-4 border-b border-gray-100 dark:border-gray-800',
        children: jsxs('div', { className: 'flex flex-col gap-2', children: [
          jsxs('div', { className: 'flex items-center justify-between', children: [
            jsx('h1', { className: 'text-sm font-semibold tracking-tight', children: 'Meeting Notes' }),
            jsx('button', {
              onClick: () => setShowNew(!showNew),
              className: showNew
                ? 'w-7 h-7 flex items-center justify-center rounded-lg bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 transition-colors'
                : 'w-7 h-7 flex items-center justify-center rounded-full bg-red-500 hover:bg-red-600 text-white transition-colors',
              title: showNew ? 'Close' : 'Record',
              children: showNew
                ? jsx(CloseIcon, {})
                : jsx('svg', {
                    xmlns: 'http://www.w3.org/2000/svg', viewBox: '0 0 24 24', fill: 'currentColor', className: 'w-4 h-4',
                    children: jsx('circle', { cx: '12', cy: '12', r: '8' }),
                  }),
            }),
          ]}),
          // Nav tabs
          jsxs('div', { className: 'flex gap-1', children: [
            jsx('button', {
              onClick: () => onViewChange('sessions'),
              className: `px-2 py-1 rounded text-[11px] font-medium transition-colors ${currentView === 'sessions' ? 'bg-gray-200 dark:bg-gray-700 text-gray-900 dark:text-gray-100' : 'text-gray-400 hover:text-gray-600 dark:hover:text-gray-300'}`,
              children: 'Sessions',
            }),
            jsx('button', {
              onClick: () => onViewChange('people'),
              className: `px-2 py-1 rounded text-[11px] font-medium transition-colors ${currentView === 'people' ? 'bg-gray-200 dark:bg-gray-700 text-gray-900 dark:text-gray-100' : 'text-gray-400 hover:text-gray-600 dark:hover:text-gray-300'}`,
              children: 'People',
            }),
            jsx('button', {
              onClick: () => onViewChange('settings'),
              className: `px-2 py-1 rounded text-[11px] font-medium transition-colors ${currentView === 'settings' ? 'bg-gray-200 dark:bg-gray-700 text-gray-900 dark:text-gray-100' : 'text-gray-400 hover:text-gray-600 dark:hover:text-gray-300'}`,
              children: 'Settings',
            }),
          ]}),
        ]}),
      });

      const sidebarChildren = [header];

      if (currentView === 'sessions') {
        // New session form
        if (showNew) {
          sidebarChildren.push(jsx('div', {
            key: 'new-form',
            className: 'px-3 py-3 border-b border-gray-100 dark:border-gray-800',
            children: jsx(NewSessionPanel, {
              sources, fields,
              onCreated: async () => { await onCreated(); },
              onSelect: (id) => { setShowNew(false); onSelect(id); },
            }),
          }));
        }

        // Sessions list
        sidebarChildren.push(jsx('div', {
          key: 'list',
          className: 'flex-1 overflow-y-auto sidebar-scroll px-2 py-2 space-y-0.5',
          children: sessions.length === 0
            ? jsx('p', { className: 'text-xs text-gray-400 dark:text-gray-600 text-center py-8', children: 'No sessions yet' })
            : sessions.map(s => jsx(SidebarItem, {
                key: s.id, session: s,
                selected: s.id === selectedId,
                onClick: () => onSelect(s.id),
              })),
        }));

        // Pagination
        if (total > PAGE_SIZE) {
          sidebarChildren.push(jsxs('div', {
            key: 'pagination',
            className: 'flex-shrink-0 flex items-center justify-between px-3 py-2 border-t border-gray-100 dark:border-gray-800 text-[11px] text-gray-400 dark:text-gray-500',
            children: [
              jsx('button', {
                disabled: offset === 0,
                onClick: () => onPageChange(Math.max(0, offset - PAGE_SIZE)),
                className: 'hover:text-gray-700 dark:hover:text-gray-300 disabled:opacity-30 transition-colors',
                children: 'Prev',
              }),
              jsx('span', { children: `${Math.floor(offset / PAGE_SIZE) + 1} / ${Math.ceil(total / PAGE_SIZE)}` }),
              jsx('button', {
                disabled: offset + PAGE_SIZE >= total,
                onClick: () => onPageChange(offset + PAGE_SIZE),
                className: 'hover:text-gray-700 dark:hover:text-gray-300 disabled:opacity-30 transition-colors',
                children: 'Next',
              }),
            ],
          }));
        }
      } else if (currentView === 'people') {
        sidebarChildren.push(jsx('div', {
          key: 'people-list',
          className: 'flex-1 overflow-y-auto sidebar-scroll',
          children: jsx(PeopleSidebar, {
            selectedId: selectedPersonId,
            onSelect: (id) => setSelectedPersonId(id),
            people,
            onRefresh: refreshPeople,
          }),
        }));
      } else if (currentView === 'settings') {
        sidebarChildren.push(jsx('div', {
          key: 'settings-nav',
          className: 'flex-1 overflow-y-auto sidebar-scroll',
          children: jsx(SettingsSidebar, { selected: settingsCategory, onSelect: setSettingsCategory }),
        }));
      }

      return jsx('div', {
        className: 'h-full flex flex-col bg-white dark:bg-gray-900 md:border-r border-gray-200 dark:border-gray-800',
        children: sidebarChildren,
      });
    }

    // ── App ──

    function App() {
      const [sessions, setSessions] = useState([]);
      const [total, setTotal] = useState(0);
      const [offset, setOffset] = useState(0);
      const [sources, setSources] = useState([]);
      const [fields, setFields] = useState({});
      const [selectedId, setSelectedId] = useState(null);
      const [showNew, setShowNew] = useState(false);
      const [mobileView, setMobileView] = useState('list');
      const [currentView, setCurrentView] = useState('sessions');
      const [settingsCategory, setSettingsCategory] = useState('services');
      const [people, setPeople] = useState([]);
      const [selectedPersonId, setSelectedPersonId] = useState(null);
      const isMobile = useIsMobile();
      const selectedIdRef = useRef(selectedId);
      selectedIdRef.current = selectedId;

      // WebSocket event handler
      function handleWsEvent(event) {
        switch (event.type) {
          case 'init':
            setSessions(event.data.sessions || []);
            setTotal(event.data.total || 0);
            break;
          case 'session_created':
            setSessions(prev => [event.data, ...prev]);
            setTotal(prev => prev + 1);
            break;
          case 'session_updated':
            setSessions(prev => prev.map(s => s.id === event.data.id ? event.data : s));
            break;
          case 'session_deleted':
            setSessions(prev => prev.filter(s => s.id !== event.data.id));
            setTotal(prev => Math.max(0, prev - 1));
            if (selectedIdRef.current === event.data.id) setSelectedId(null);
            break;
          case 'file_sizes':
            setSessions(prev => prev.map(s =>
              s.id === event.data.id ? { ...s, file_sizes: event.data.file_sizes } : s
            ));
            break;
          case 'session_notice':
            setSessions(prev => prev.map(s =>
              s.id === event.data.id
                ? { ...s, notices: [...(s.notices || []), event.data.notice] }
                : s
            ));
            break;
          case 'session_notices':
            setSessions(prev => prev.map(s =>
              s.id === event.data.id
                ? { ...s, notices: event.data.notices }
                : s
            ));
            break;
          case 'transcription_progress':
            setSessions(prev => prev.map(s =>
              s.id === event.data.id
                ? { ...s, processing_state: event.data.status }
                : s
            ));
            break;
          case 'transcription_completed':
            setSessions(prev => prev.map(s =>
              s.id === event.data.id
                ? { ...s, processing_state: null, transcript_available: true, unconfirmed_speakers: event.data.unconfirmed_speakers }
                : s
            ));
            break;
          case 'transcription_failed':
            setSessions(prev => prev.map(s =>
              s.id === event.data.id
                ? { ...s, processing_state: null }
                : s
            ));
            break;
        }
      }

      useWebSocket(handleWsEvent);

      // Fetch config (sources + fields) once on mount
      useEffect(() => {
        api('/config').then(d => { setSources(d.sources || []); setFields(d.fields || {}); }).catch(() => {});
      }, []);

      const refreshPeople = useCallback(() => {
        api('/people').then(d => setPeople(d.people || [])).catch(() => {});
      }, []);

      // Load people when switching to people view
      useEffect(() => {
        if (currentView === 'people') refreshPeople();
      }, [currentView]);

      // REST refresh for after actions (belt and suspenders with WS)
      const refresh = useCallback(async (currentOffset) => {
        try {
          const data = await api(`/sessions?limit=${PAGE_SIZE}&offset=${currentOffset ?? offset}`);
          setSessions(data.sessions);
          setTotal(data.total);
        } catch (e) { /* ignore */ }
      }, [offset]);

      // Auto-select first recording session or first session
      useEffect(() => {
        if (sessions.length > 0 && !selectedId) {
          const recording = sessions.find(s => s.state === 'recording');
          setSelectedId(recording ? recording.id : sessions[0].id);
        }
      }, [sessions]);

      function handleSelect(id) {
        setSelectedId(id);
        if (isMobile) setMobileView('detail');
      }

      function handleBack() {
        setMobileView('list');
      }

      function handlePageChange(newOffset) {
        setOffset(newOffset);
        refresh(newOffset);
      }

      function handleDeleted() {
        setSelectedId(null);
        if (isMobile) setMobileView('list');
      }

      const selectedSession = sessions.find(s => s.id === selectedId) || null;

      const sidebarProps = {
        sessions, total, offset,
        selectedId,
        onSelect: handleSelect,
        onPageChange: handlePageChange,
        sources, fields,
        onCreated: async () => { setOffset(0); await refresh(0); },
        showNew, setShowNew,
        currentView,
        onViewChange: (v) => { setCurrentView(v); if (v !== 'sessions') setSelectedId(null); },
        // People
        people, selectedPersonId, setSelectedPersonId, refreshPeople,
        // Settings
        settingsCategory, setSettingsCategory,
      };

      function mainContent() {
        if (currentView === 'settings') return jsx(SettingsPage, { category: settingsCategory });
        if (currentView === 'people') {
          const selectedPerson = people.find(p => p.id === selectedPersonId) || people[0] || null;
          return jsx(PersonDetail, { person: selectedPerson, onRefresh: () => { refreshPeople(); setSelectedPersonId(null); } });
        }
        return jsx(SessionDetail, {
          session: selectedSession,
          onRefresh: refresh,
          onDeleted: handleDeleted,
          onBack: handleBack,
          isMobile: isMobile,
          fields,
        });
      }

      // ── Mobile layout: full-screen views ──
      if (isMobile) {
        if (currentView !== 'sessions') {
          return jsx('div', { className: 'h-full bg-gray-50 dark:bg-gray-950', children: mainContent() });
        }
        if (mobileView === 'detail' && selectedSession) {
          return jsx('div', { className: 'h-full bg-gray-50 dark:bg-gray-950', children: mainContent() });
        }
        return jsx('div', { className: 'h-full', children: jsx(Sidebar, sidebarProps) });
      }

      // ── Desktop layout: side-by-side ──
      return jsxs('div', {
        className: 'h-full flex',
        children: [
          jsx('div', { className: 'w-72 flex-shrink-0 h-full', children: jsx(Sidebar, sidebarProps) }),
          jsx('div', { className: 'flex-1 h-full bg-gray-50 dark:bg-gray-950', children: mainContent() }),
        ],
      });
    }

    createRoot(document.getElementById('root')).render(jsx(App, {}));
  </script>
</body>
</html>
