<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meeting Notes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'media',
    }
  </script>
  <style>
    @keyframes pulse-recording { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .animate-pulse-recording { animation: pulse-recording 1.5s ease-in-out infinite; }
    audio::-webkit-media-controls-panel { background: transparent; }
    .sidebar-scroll::-webkit-scrollbar { width: 4px; }
    .sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
    .sidebar-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
    @media (prefers-color-scheme: dark) {
      .sidebar-scroll::-webkit-scrollbar-thumb { background: #374151; }
    }
  </style>
</head>
<body class="h-full bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 antialiased overflow-hidden">
  <div id="root" class="h-full"></div>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@19?dev",
        "react-dom/client": "https://esm.sh/react-dom@19/client?dev",
        "react/jsx-runtime": "https://esm.sh/react@19/jsx-runtime?dev"
      }
    }
  </script>
  <script type="module">
    import { useState, useEffect, useCallback, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { jsx, jsxs as _jsxs, Fragment } from 'react/jsx-runtime';
    // Wrapper: filter false/null/undefined from children arrays (jsx-runtime doesn't do this)
    // Also extracts 'key' to avoid React 19 warning about key in spread
    function jsxs(type, props, key) {
      if (props.children && Array.isArray(props.children)) {
        const { key: k, ...rest } = props;
        const finalKey = key ?? k;
        const filtered = rest.children.filter(c => c != null && c !== false);
        if (filtered.length === 0) {
          const { children, ...noChildren } = rest;
          return jsx(type, noChildren, finalKey);
        }
        if (filtered.length === 1) {
          return jsx(type, { ...rest, children: filtered[0] }, finalKey);
        }
        return _jsxs(type, { ...rest, children: filtered }, finalKey);
      }
      return _jsxs(type, props, key);
    }

    const API = window.location.origin;
    const PAGE_SIZE = 50;

    async function api(path, opts = {}) {
      const res = await fetch(`${API}${path}`, {
        headers: { 'Content-Type': 'application/json' },
        ...opts,
      });
      if (!res.ok && res.status !== 204) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.error || `HTTP ${res.status}`);
      }
      if (res.status === 204) return null;
      return res.json();
    }

    function useIsMobile() {
      const [mobile, setMobile] = useState(window.innerWidth < 768);
      useEffect(() => {
        const mq = window.matchMedia('(max-width: 767px)');
        const handler = (e) => setMobile(e.matches);
        mq.addEventListener('change', handler);
        return () => mq.removeEventListener('change', handler);
      }, []);
      return mobile;
    }

    // ── Icons ──

    function ChevronIcon({ open }) {
      return jsx('svg', {
        xmlns: 'http://www.w3.org/2000/svg', viewBox: '0 0 20 20', fill: 'currentColor',
        className: `w-3.5 h-3.5 transition-transform ${open ? 'rotate-90' : ''}`,
        children: jsx('path', {
          fillRule: 'evenodd', clipRule: 'evenodd',
          d: 'M7.21 14.77a.75.75 0 01.02-1.06L11.168 10 7.23 6.29a.75.75 0 111.04-1.08l4.5 4.25a.75.75 0 010 1.08l-4.5 4.25a.75.75 0 01-1.06-.02z',
        }),
      });
    }

    const PlusIcon = () => jsx('svg', {
      xmlns: 'http://www.w3.org/2000/svg', viewBox: '0 0 20 20', fill: 'currentColor', className: 'w-4 h-4',
      children: jsx('path', { d: 'M10.75 4.75a.75.75 0 00-1.5 0v4.5h-4.5a.75.75 0 000 1.5h4.5v4.5a.75.75 0 001.5 0v-4.5h4.5a.75.75 0 000-1.5h-4.5v-4.5z' }),
    });

    const CloseIcon = () => jsx('svg', {
      xmlns: 'http://www.w3.org/2000/svg', viewBox: '0 0 20 20', fill: 'currentColor', className: 'w-4 h-4',
      children: jsx('path', { d: 'M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z' }),
    });

    const MenuIcon = () => jsx('svg', {
      xmlns: 'http://www.w3.org/2000/svg', viewBox: '0 0 20 20', fill: 'currentColor', className: 'w-5 h-5',
      children: jsx('path', {
        fillRule: 'evenodd', clipRule: 'evenodd',
        d: 'M2 4.75A.75.75 0 012.75 4h14.5a.75.75 0 010 1.5H2.75A.75.75 0 012 4.75zm0 5A.75.75 0 012.75 9h14.5a.75.75 0 010 1.5H2.75A.75.75 0 012 9.75zm0 5a.75.75 0 01.75-.75h14.5a.75.75 0 010 1.5H2.75a.75.75 0 01-.75-.75z',
      }),
    });

    const BackIcon = () => jsx('svg', {
      xmlns: 'http://www.w3.org/2000/svg', viewBox: '0 0 20 20', fill: 'currentColor', className: 'w-5 h-5',
      children: jsx('path', {
        fillRule: 'evenodd', clipRule: 'evenodd',
        d: 'M17 10a.75.75 0 01-.75.75H5.612l4.158 3.96a.75.75 0 11-1.04 1.08l-5.5-5.25a.75.75 0 010-1.08l5.5-5.25a.75.75 0 011.04 1.08L5.612 9.25H16.25A.75.75 0 0117 10z',
      }),
    });

    const PlayIcon = () => jsx('svg', {
      xmlns: 'http://www.w3.org/2000/svg', viewBox: '0 0 20 20', fill: 'currentColor', className: 'w-4 h-4',
      children: jsx('path', { d: 'M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z' }),
    });

    const StopIcon = () => jsx('svg', {
      xmlns: 'http://www.w3.org/2000/svg', viewBox: '0 0 20 20', fill: 'currentColor', className: 'w-4 h-4',
      children: jsx('path', {
        fillRule: 'evenodd', clipRule: 'evenodd',
        d: 'M2 10a8 8 0 1116 0 8 8 0 01-16 0zm5-2.25A.75.75 0 017.75 7h4.5a.75.75 0 01.75.75v4.5a.75.75 0 01-.75.75h-4.5a.75.75 0 01-.75-.75v-4.5z',
      }),
    });

    // ── Helpers ──

    function StateBadge({ state, small }) {
      const styles = {
        created: 'bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300',
        recording: 'bg-red-100 text-red-700 dark:bg-red-900/40 dark:text-red-300 animate-pulse-recording',
        stopped: 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300',
      };
      const size = small ? 'px-1.5 py-0 text-[10px]' : 'px-2 py-0.5 text-xs';
      return jsx('span', {
        className: `inline-flex items-center rounded-full font-medium ${size} ${styles[state] || ''}`,
        children: state,
      });
    }

    function formatTime(iso) {
      const d = new Date(iso);
      const now = new Date();
      const diff = now - d;
      if (diff < 60000) return 'just now';
      if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
      if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
      if (d.getFullYear() === now.getFullYear()) {
        return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
      }
      return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function typeBadgeColor(type) {
      const c = {
        mic: 'bg-violet-100 text-violet-600 dark:bg-violet-900/30 dark:text-violet-400',
        system_mix: 'bg-cyan-100 text-cyan-600 dark:bg-cyan-900/30 dark:text-cyan-400',
        app: 'bg-orange-100 text-orange-600 dark:bg-orange-900/30 dark:text-orange-400',
      };
      return c[type] || 'bg-gray-100 text-gray-600 dark:bg-gray-800 dark:text-gray-400';
    }

    const INPUT_CLS = 'w-full rounded-md border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 px-2.5 py-1.5 text-sm text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-1 focus:ring-blue-500 transition-colors';
    const LABEL_CLS = 'block text-[11px] font-medium text-gray-400 dark:text-gray-500 mb-0.5 uppercase tracking-wider';

    // ── Sidebar Session Item ──

    function SidebarItem({ session, selected, onClick }) {
      const s = session;
      return jsx('button', {
        onClick,
        className: [
          'w-full text-left px-3 py-2.5 rounded-lg transition-colors',
          selected
            ? 'bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800'
            : 'hover:bg-gray-100 dark:hover:bg-gray-800/60 border border-transparent',
        ].join(' '),
        children: jsxs('div', { className: 'flex items-center justify-between gap-2', children: [
          jsxs('div', { className: 'min-w-0 flex-1', children: [
            jsxs('div', { className: 'flex items-center gap-2', children: [
              jsx('code', {
                className: `text-xs font-mono ${selected ? 'text-blue-700 dark:text-blue-300' : 'text-gray-500 dark:text-gray-400'}`,
                children: s.id.slice(0, 8),
              }),
              jsx(StateBadge, { state: s.state, small: true }),
            ]}),
            jsx('p', {
              className: 'text-[11px] text-gray-400 dark:text-gray-500 mt-0.5',
              children: formatTime(s.updated_at || s.created_at),
            }),
          ]}),
          s.state === 'recording' && jsx('span', {
            className: 'w-2 h-2 rounded-full bg-red-500 animate-pulse-recording flex-shrink-0',
          }),
        ]}),
      });
    }

    // ── New Session Form ──

    function NewSessionPanel({ sources: availableSources, fields, onCreated, onSelect }) {
      // Initialize field values from backend defaults
      const fieldEntries = useMemo(() => Object.entries(fields || {}), [fields]);
      const initVals = useMemo(() => {
        const v = {};
        for (const [k, f] of fieldEntries) v[k] = f.default ?? '';
        return v;
      }, [fieldEntries]);

      const [vals, setVals] = useState(initVals);
      const [selectedSources, setSelectedSources] = useState([]);
      const [showAdvanced, setShowAdvanced] = useState(false);
      const [error, setError] = useState(null);
      const [creating, setCreating] = useState(false);

      // Re-init when fields arrive from backend
      useEffect(() => { if (fieldEntries.length) setVals(initVals); }, [initVals]);

      useEffect(() => {
        if (availableSources.length > 0 && selectedSources.length === 0) {
          setSelectedSources(availableSources.filter(s => s.default_selected).map(s => s.id));
        }
      }, [availableSources]);

      function setVal(key, value) { setVals(prev => ({ ...prev, [key]: value })); }
      function toggleSource(id) {
        setSelectedSources(prev =>
          prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]
        );
      }

      // Check if a field should be visible given current values
      function isVisible(f) {
        if (!f.show_when) return true;
        return vals[f.show_when.field] === f.show_when.value;
      }

      // Build request body, mapping config_path fields into nested objects
      function buildBody() {
        const body = { sources: selectedSources };
        for (const [key, f] of fieldEntries) {
          const v = vals[key];
          if (v === '' && f.type !== 'text') continue;
          if (f.config_path) {
            const parts = f.config_path.split('.');
            let obj = body;
            for (let i = 0; i < parts.length - 1; i++) {
              if (!obj[parts[i]]) obj[parts[i]] = {};
              obj = obj[parts[i]];
            }
            obj[parts[parts.length - 1]] = typeof f.default === 'number' ? Number(v) : v;
          } else {
            body[key] = typeof f.default === 'number' ? Number(v) : v;
          }
        }
        return body;
      }

      async function create() {
        setError(null);
        setCreating(true);
        try {
          const session = await api('/sessions', { method: 'POST', body: JSON.stringify(buildBody()) });
          await onCreated();
          if (session && session.id) onSelect(session.id);
        } catch (e) { setError(e.message); }
        finally { setCreating(false); }
      }

      // Render a single config field
      function renderField(key, f) {
        if (!isVisible(f)) return null;
        const label = jsx('label', { className: LABEL_CLS, title: f.description, children: f.label });
        let input;
        if (f.type === 'select') {
          input = jsxs('select', {
            value: vals[key],
            onChange: e => setVal(key, typeof f.default === 'number' ? Number(e.target.value) : e.target.value),
            className: INPUT_CLS, title: f.description,
            children: (f.options || []).map(o => jsx('option', { key: o.value, value: o.value, children: o.label })),
          });
        } else if (f.type === 'textarea') {
          input = jsx('textarea', {
            value: vals[key], onChange: e => setVal(key, e.target.value),
            placeholder: f.placeholder || '', className: INPUT_CLS + ' resize-y min-h-[48px]', rows: 2,
            title: f.description,
          });
        } else {
          input = jsx('input', {
            value: vals[key], onChange: e => setVal(key, e.target.value),
            placeholder: f.placeholder || f.default || '', className: INPUT_CLS,
            title: f.description,
          });
        }
        return jsxs('div', { key, children: [label, input] });
      }

      // Split fields into basic and advanced
      const basicFields = fieldEntries.filter(([, f]) => !f.advanced);
      const advancedFields = fieldEntries.filter(([, f]) => f.advanced);
      const visibleAdvanced = advancedFields.filter(([, f]) => isVisible(f));

      return jsxs('div', { className: 'space-y-3', children: [
        jsx('div', { className: `grid grid-cols-${Math.min(basicFields.length, 2)} gap-2`,
          children: basicFields.map(([k, f]) => renderField(k, f)),
        }),
        jsxs('div', { children: [
          jsx('label', { className: LABEL_CLS, children: 'Sources' }),
          jsx('div', { className: 'space-y-0.5', children:
            availableSources.map(s => jsx('label', {
              key: s.id,
              className: 'flex items-center gap-2 py-1 px-1.5 rounded hover:bg-gray-100 dark:hover:bg-gray-800/50 cursor-pointer transition-colors',
              children: jsxs(Fragment, { children: [
                jsx('input', {
                  type: 'checkbox',
                  checked: selectedSources.includes(s.id),
                  onChange: () => toggleSource(s.id),
                  className: 'rounded border-gray-300 dark:border-gray-600 text-blue-600 focus:ring-blue-500/40 h-3.5 w-3.5',
                }),
                jsx('span', { className: 'text-xs text-gray-700 dark:text-gray-300 flex-1 truncate', children: s.label }),
                jsx('span', {
                  className: `text-[9px] font-medium px-1 py-0 rounded-full ${typeBadgeColor(s.source_type)}`,
                  children: s.source_type === 'system_mix' ? 'sys' : s.source_type,
                }),
              ]}),
            })),
          }),
        ]}),
        visibleAdvanced.length > 0 && jsx('button', {
          className: 'flex items-center gap-1 text-[11px] text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300 transition-colors',
          onClick: () => setShowAdvanced(!showAdvanced),
          children: jsxs(Fragment, { children: [jsx(ChevronIcon, { open: showAdvanced }), 'Advanced'] }),
        }),
        showAdvanced && jsx('div', { className: 'space-y-2',
          children: advancedFields.map(([k, f]) => renderField(k, f)),
        }),
        jsx('button', {
          onClick: create, disabled: creating,
          className: 'w-full flex justify-center items-center px-3 py-2 rounded-lg text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 disabled:opacity-50 transition-colors',
          children: creating ? 'Creating...' : 'Create Session',
        }),
        error && jsx('p', { className: 'text-xs text-red-500', children: error }),
      ]});
    }

    // ── Session Detail (main panel) ──

    function SessionDetail({ session, onRefresh, onDeleted, onBack, isMobile }) {
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);

      if (!session) {
        return jsx('div', {
          className: 'h-full flex items-center justify-center px-4',
          children: jsx('p', {
            className: 'text-gray-400 dark:text-gray-600 text-sm text-center',
            children: 'Select a session or create a new one',
          }),
        });
      }

      async function action(fn) {
        setLoading(true);
        setError(null);
        try { await fn(); await onRefresh(); }
        catch (e) { setError(e.message); }
        finally { setLoading(false); }
      }

      const s = session;
      const audioFiles = s.files.filter(f => f.endsWith('.wav') || f.endsWith('.mp3'));
      const hasAudio = s.state === 'stopped' && audioFiles.length > 0;

      return jsx('div', {
        className: 'h-full flex flex-col',
        children: jsxs(Fragment, { children: [
          // Header
          jsxs('div', {
            className: 'flex-shrink-0 px-4 md:px-6 py-3 md:py-4 border-b border-gray-200 dark:border-gray-800',
            children: [
              // Top row: back + ID + badge
              jsxs('div', { className: 'flex items-center justify-between gap-2', children: [
                jsxs('div', { className: 'flex items-center gap-2 min-w-0', children: [
                  isMobile && jsx('button', {
                    onClick: onBack,
                    className: 'p-1 -ml-1 text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 transition-colors',
                    children: jsx(BackIcon, {}),
                  }),
                  jsx('h2', { className: 'text-base md:text-lg font-semibold tracking-tight flex-shrink-0', children: 'Session' }),
                  jsx('code', { className: 'text-xs md:text-sm font-mono text-gray-500 dark:text-gray-400 truncate', children: s.id.slice(0, 8) }),
                  jsx(StateBadge, { state: s.state }),
                ]}),
                // Action buttons
                jsxs('div', { className: 'flex items-center gap-1.5 md:gap-2 flex-shrink-0', children: [
                  s.state === 'created' && jsx('button', {
                    disabled: loading,
                    onClick: () => action(() => api(`/sessions/${s.id}/recording/start`, { method: 'POST' })),
                    className: 'inline-flex items-center gap-1.5 px-3 md:px-4 py-1.5 md:py-2 rounded-lg text-xs md:text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 disabled:opacity-40 transition-colors',
                    children: jsxs(Fragment, { children: [jsx(PlayIcon, {}), isMobile ? null : 'Record'] }),
                  }),
                  s.state === 'recording' && jsx('button', {
                    disabled: loading,
                    onClick: () => action(() => api(`/sessions/${s.id}/recording/stop`, { method: 'POST' })),
                    className: 'inline-flex items-center gap-1.5 px-3 md:px-4 py-1.5 md:py-2 rounded-lg text-xs md:text-sm font-medium text-white bg-amber-600 hover:bg-amber-700 disabled:opacity-40 transition-colors',
                    children: jsxs(Fragment, { children: [jsx(StopIcon, {}), isMobile ? null : 'Stop'] }),
                  }),
                  jsx('button', {
                    disabled: loading,
                    onClick: () => action(async () => {
                      await api(`/sessions/${s.id}`, { method: 'DELETE' });
                      onDeleted();
                    }),
                    className: 'inline-flex items-center px-2.5 md:px-3 py-1.5 md:py-2 rounded-lg text-xs md:text-sm font-medium text-red-600 dark:text-red-400 bg-red-50 dark:bg-red-900/20 hover:bg-red-100 dark:hover:bg-red-900/40 disabled:opacity-40 transition-colors',
                    children: 'Delete',
                  }),
                ]}),
              ]}),
              error && jsx('p', { className: 'mt-2 text-sm text-red-500', children: error }),
            ],
          }),

          // Content
          jsx('div', {
            className: 'flex-1 overflow-y-auto px-4 md:px-6 py-4 md:py-5',
            children: jsxs('div', { className: 'max-w-3xl space-y-4 md:space-y-6', children: [

              // Info grid
              jsx('div', {
                className: 'rounded-xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 p-4 md:p-5',
                children: jsxs('div', {
                  className: 'grid grid-cols-2 md:grid-cols-3 gap-3 md:gap-4',
                  children: [
                    jsxs('div', { children: [
                      jsx('p', { className: 'text-[11px] uppercase tracking-wider text-gray-400 dark:text-gray-500 mb-0.5', children: 'Language' }),
                      jsx('p', { className: 'text-sm font-medium', children: s.language }),
                    ]}),
                    jsxs('div', { children: [
                      jsx('p', { className: 'text-[11px] uppercase tracking-wider text-gray-400 dark:text-gray-500 mb-0.5', children: 'Format' }),
                      jsx('p', { className: 'text-sm font-medium', children: `${s.format.toUpperCase()} / ${s.sample_rate} Hz` }),
                    ]}),
                    s.format === 'mp3' && jsxs('div', { children: [
                      jsx('p', { className: 'text-[11px] uppercase tracking-wider text-gray-400 dark:text-gray-500 mb-0.5', children: 'MP3' }),
                      jsx('p', { className: 'text-sm font-medium', children: `${s.mp3.bitrate_kbps} kbps @ ${s.mp3.sample_rate} Hz` }),
                    ]}),
                    jsxs('div', { children: [
                      jsx('p', { className: 'text-[11px] uppercase tracking-wider text-gray-400 dark:text-gray-500 mb-0.5', children: 'Created' }),
                      jsx('p', { className: 'text-sm font-medium', children: new Date(s.created_at).toLocaleString() }),
                    ]}),
                    s.updated_at !== s.created_at && jsxs('div', { children: [
                      jsx('p', { className: 'text-[11px] uppercase tracking-wider text-gray-400 dark:text-gray-500 mb-0.5', children: 'Updated' }),
                      jsx('p', { className: 'text-sm font-medium', children: new Date(s.updated_at).toLocaleString() }),
                    ]}),
                    s.sources && s.sources.length > 0 && jsxs('div', { className: 'col-span-2 md:col-span-3', children: [
                      jsx('p', { className: 'text-[11px] uppercase tracking-wider text-gray-400 dark:text-gray-500 mb-1', children: 'Sources' }),
                      jsx('div', { className: 'flex flex-wrap gap-1.5', children:
                        s.sources.map(src => jsx('span', {
                          key: src,
                          className: 'inline-flex items-center px-2 py-0.5 rounded-full text-[11px] font-medium bg-gray-100 text-gray-600 dark:bg-gray-800 dark:text-gray-400',
                          children: src,
                        })),
                      }),
                    ]}),
                    s.summarization_instruction && jsxs('div', { className: 'col-span-2 md:col-span-3', children: [
                      jsx('p', { className: 'text-[11px] uppercase tracking-wider text-gray-400 dark:text-gray-500 mb-0.5', children: 'Summarization' }),
                      jsx('p', { className: 'text-sm text-gray-600 dark:text-gray-400', children: s.summarization_instruction }),
                    ]}),
                  ],
                }),
              }),

              // Recording indicator
              s.state === 'recording' && jsx('div', {
                className: 'rounded-xl border border-red-200 dark:border-red-900/40 bg-red-50 dark:bg-red-900/10 p-4 md:p-5',
                children: jsxs(Fragment, { children: [
                  jsxs('div', { className: 'flex items-center gap-2 mb-3', children: [
                    jsx('span', { className: 'w-2.5 h-2.5 rounded-full bg-red-500 animate-pulse-recording' }),
                    jsx('p', { className: 'text-sm font-medium text-red-700 dark:text-red-300', children: 'Recording in progress' }),
                  ]}),
                  s.files.length > 0 && jsx('div', { className: 'flex flex-wrap gap-1.5', children:
                    s.files.map(f => jsx('span', {
                      key: f,
                      className: 'inline-flex items-center px-2 py-0.5 rounded text-[11px] bg-red-100 text-red-600 dark:bg-red-900/30 dark:text-red-400 font-mono',
                      children: f,
                    })),
                  }),
                ]}),
              }),

              // Audio files
              hasAudio && jsx('div', {
                className: 'rounded-xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 p-4 md:p-5',
                children: jsxs(Fragment, { children: [
                  jsx('p', { className: 'text-[11px] uppercase tracking-wider text-gray-400 dark:text-gray-500 mb-3', children: 'Recordings' }),
                  jsx('div', { className: 'space-y-3', children:
                    audioFiles.map(f => {
                      const src = `${API}/sessions/${s.id}/files/${encodeURIComponent(f)}`;
                      const ext = f.split('.').pop();
                      const label = f.replace(`.${ext}`, '').replace(/_/g, ' ');
                      return jsxs('div', { key: f, className: 'space-y-1', children: [
                        jsx('p', { className: 'text-xs text-gray-500 dark:text-gray-400 capitalize font-medium', children: label }),
                        jsx('audio', { controls: true, preload: 'none', src, className: 'w-full h-10 rounded-lg' }),
                      ]});
                    }),
                  }),
                ]}),
              }),

              // All files
              s.files.length > 0 && s.state === 'stopped' && jsx('div', {
                className: 'rounded-xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 p-4 md:p-5',
                children: jsxs(Fragment, { children: [
                  jsx('p', { className: 'text-[11px] uppercase tracking-wider text-gray-400 dark:text-gray-500 mb-2', children: 'All Files' }),
                  jsx('div', { className: 'space-y-1', children:
                    s.files.map(f => jsxs('div', {
                      key: f,
                      className: 'flex items-center justify-between py-1 gap-2',
                      children: [
                        jsx('span', { className: 'text-sm font-mono text-gray-600 dark:text-gray-400 truncate min-w-0', children: f }),
                        jsx('a', {
                          href: `${API}/sessions/${s.id}/files/${encodeURIComponent(f)}`,
                          target: '_blank',
                          className: 'text-xs text-blue-600 dark:text-blue-400 hover:underline flex-shrink-0',
                          children: 'download',
                        }),
                      ],
                    })),
                  }),
                ]}),
              }),

              jsxs('p', {
                className: 'text-[11px] text-gray-300 dark:text-gray-700 font-mono break-all',
                children: ['ID: ', s.id],
              }),
            ]}),
          }),
        ]}),
      });
    }

    // ── Sidebar ──

    function Sidebar({ sessions, total, offset, selectedId, onSelect, onPageChange, sources, fields, onCreated, showNew, setShowNew }) {
      const toggleBtnCls = [
        'w-7 h-7 flex items-center justify-center rounded-lg transition-colors',
        showNew
          ? 'bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300'
          : 'text-gray-400 dark:text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 hover:text-gray-600 dark:hover:text-gray-300',
      ].join(' ');

      const header = jsx('div', {
        key: 'header',
        className: 'flex-shrink-0 px-4 py-3 md:py-4 border-b border-gray-100 dark:border-gray-800',
        children: jsxs('div', { className: 'flex items-center justify-between', children: [
          jsx('h1', { className: 'text-sm font-semibold tracking-tight', children: 'Meeting Notes' }),
          jsx('button', {
            onClick: () => setShowNew(!showNew),
            className: toggleBtnCls,
            title: showNew ? 'Close' : 'New session',
            children: showNew ? jsx(CloseIcon, {}) : jsx(PlusIcon, {}),
          }),
        ]}),
      });

      const sidebarChildren = [header];

      // New session form
      if (showNew) {
        sidebarChildren.push(jsx('div', {
          key: 'new-form',
          className: 'px-3 py-3 border-b border-gray-100 dark:border-gray-800',
          children: jsx(NewSessionPanel, {
            sources, fields,
            onCreated: async () => { await onCreated(); },
            onSelect: (id) => { setShowNew(false); onSelect(id); },
          }),
        }));
      }

      // Sessions list
      sidebarChildren.push(jsx('div', {
        key: 'list',
        className: 'flex-1 overflow-y-auto sidebar-scroll px-2 py-2 space-y-0.5',
        children: sessions.length === 0
          ? jsx('p', { className: 'text-xs text-gray-400 dark:text-gray-600 text-center py-8', children: 'No sessions yet' })
          : sessions.map(s => jsx(SidebarItem, {
              key: s.id, session: s,
              selected: s.id === selectedId,
              onClick: () => onSelect(s.id),
            })),
      }));

      // Pagination
      if (total > PAGE_SIZE) {
        sidebarChildren.push(jsxs('div', {
          key: 'pagination',
          className: 'flex-shrink-0 flex items-center justify-between px-3 py-2 border-t border-gray-100 dark:border-gray-800 text-[11px] text-gray-400 dark:text-gray-500',
          children: [
            jsx('button', {
              disabled: offset === 0,
              onClick: () => onPageChange(Math.max(0, offset - PAGE_SIZE)),
              className: 'hover:text-gray-700 dark:hover:text-gray-300 disabled:opacity-30 transition-colors',
              children: 'Prev',
            }),
            jsx('span', { children: `${Math.floor(offset / PAGE_SIZE) + 1} / ${Math.ceil(total / PAGE_SIZE)}` }),
            jsx('button', {
              disabled: offset + PAGE_SIZE >= total,
              onClick: () => onPageChange(offset + PAGE_SIZE),
              className: 'hover:text-gray-700 dark:hover:text-gray-300 disabled:opacity-30 transition-colors',
              children: 'Next',
            }),
          ],
        }));
      }

      return jsx('div', {
        className: 'h-full flex flex-col bg-white dark:bg-gray-900 md:border-r border-gray-200 dark:border-gray-800',
        children: sidebarChildren,
      });
    }

    // ── App ──

    function App() {
      const [sessions, setSessions] = useState([]);
      const [total, setTotal] = useState(0);
      const [offset, setOffset] = useState(0);
      const [sources, setSources] = useState([]);
      const [fields, setFields] = useState({});
      const [selectedId, setSelectedId] = useState(null);
      const [showNew, setShowNew] = useState(false);
      // Mobile: which view is showing — 'list' or 'detail'
      const [mobileView, setMobileView] = useState('list');
      const isMobile = useIsMobile();

      const refresh = useCallback(async (currentOffset) => {
        try {
          const data = await api(`/sessions?limit=${PAGE_SIZE}&offset=${currentOffset ?? offset}`);
          setSessions(data.sessions);
          setTotal(data.total);
        } catch (e) { /* ignore polling errors */ }
      }, [offset]);

      useEffect(() => {
        refresh();
        api('/config').then(d => { setSources(d.sources || []); setFields(d.fields || {}); }).catch(() => {});
        const interval = setInterval(() => refresh(), 2000);
        return () => clearInterval(interval);
      }, [refresh]);

      // Auto-select first recording session or first session
      useEffect(() => {
        if (sessions.length > 0 && !selectedId) {
          const recording = sessions.find(s => s.state === 'recording');
          setSelectedId(recording ? recording.id : sessions[0].id);
        }
      }, [sessions]);

      function handleSelect(id) {
        setSelectedId(id);
        if (isMobile) setMobileView('detail');
      }

      function handleBack() {
        setMobileView('list');
      }

      function handlePageChange(newOffset) {
        setOffset(newOffset);
        refresh(newOffset);
      }

      function handleDeleted() {
        setSelectedId(null);
        if (isMobile) setMobileView('list');
      }

      const selectedSession = sessions.find(s => s.id === selectedId) || null;

      // ── Mobile layout: full-screen views ──
      if (isMobile) {
        if (mobileView === 'detail' && selectedSession) {
          return jsx('div', {
            className: 'h-full bg-gray-50 dark:bg-gray-950',
            children: jsx(SessionDetail, {
              session: selectedSession,
              onRefresh: refresh,
              onDeleted: handleDeleted,
              onBack: handleBack,
              isMobile: true,
            }),
          });
        }
        // List view
        return jsx('div', {
          className: 'h-full',
          children: jsx(Sidebar, {
            sessions, total, offset,
            selectedId,
            onSelect: handleSelect,
            onPageChange: handlePageChange,
            sources, fields,
            onCreated: async () => { setOffset(0); await refresh(0); },
            showNew, setShowNew,
          }),
        });
      }

      // ── Desktop layout: side-by-side ──
      return jsxs('div', {
        className: 'h-full flex',
        children: [
          jsx('div', {
            className: 'w-72 flex-shrink-0 h-full',
            children: jsx(Sidebar, {
              sessions, total, offset,
              selectedId,
              onSelect: handleSelect,
              onPageChange: handlePageChange,
              sources,
              onCreated: async () => { setOffset(0); await refresh(0); },
              showNew, setShowNew,
            }),
          }),
          jsx('div', {
            className: 'flex-1 h-full bg-gray-50 dark:bg-gray-950',
            children: jsx(SessionDetail, {
              session: selectedSession,
              onRefresh: refresh,
              onDeleted: handleDeleted,
              onBack: handleBack,
              isMobile: false,
            }),
          }),
        ],
      });
    }

    createRoot(document.getElementById('root')).render(jsx(App, {}));
  </script>
</body>
</html>
