<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meeting Notes</title>
  <link rel="preconnect" href="https://esm.sh" />
  <script src="/vendor/tailwind.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'media',
    }
  </script>
  <style>
    @keyframes pulse-recording { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .animate-pulse-recording { animation: pulse-recording 1.5s ease-in-out infinite; }
    audio::-webkit-media-controls-panel { background: transparent; }
    @keyframes chat-panel-in {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes chat-panel-out {
      from { opacity: 1; transform: scale(1); }
      to { opacity: 0; transform: scale(0.85); }
    }
    .chat-panel-enter { animation: chat-panel-in 0.2s ease-out forwards; }
    .chat-panel-exit { animation: chat-panel-out 0.15s ease-in forwards; }
    @keyframes chat-tooltip-in {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .chat-tooltip-enter { animation: chat-tooltip-in 0.3s ease-out forwards; }
    .sidebar-scroll::-webkit-scrollbar { width: 4px; }
    .sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
    .sidebar-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
    @media (prefers-color-scheme: dark) {
      .sidebar-scroll::-webkit-scrollbar-thumb { background: #374151; }
    }
  </style>
</head>
<body class="h-full bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 antialiased overflow-hidden">
  <div id="root" class="h-full">
    <div id="loading" class="flex items-center justify-center h-full text-gray-400 dark:text-gray-600 text-sm">Loading libraries from esm.sh&hellip;</div>
  </div>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@19",
        "react-dom/client": "https://esm.sh/react-dom@19/client",
        "react/jsx-runtime": "https://esm.sh/react@19/jsx-runtime"
      }
    }
  </script>
  <script type="module" src="/app.mjs"></script>
</body>
</html>
