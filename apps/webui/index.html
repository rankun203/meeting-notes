<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meeting Notes</title>
  <link rel="preconnect" href="https://esm.sh" />
  <link rel="stylesheet" href="/tokens.css" />
  <link rel="stylesheet" href="/github-markdown.css" />
  <script src="/vendor/tailwind.js"></script>
  <script>
    // Bind the design-system tokens (defined in tokens.css as CSS custom
    // properties) into Tailwind's `mn-*` utility namespace, so components
    // can write `bg-mn-bg text-mn-text border-mn-border` and stay in sync
    // with the single source of truth without a build step.
    tailwind.config = {
      darkMode: 'media',
      theme: {
        extend: {
          colors: {
            mn: {
              bg:             'var(--mn-bg)',
              elevated:       'var(--mn-bg-elevated)',
              sidebar:        'var(--mn-bg-sidebar)',
              hover:          'var(--mn-bg-hover)',
              border:         'var(--mn-border)',
              'border-strong':'var(--mn-border-strong)',
              text:           'var(--mn-text)',
              'text-dim':     'var(--mn-text-dim)',
              'text-faint':   'var(--mn-text-faint)',
              accent:         'var(--mn-accent)',
              'accent-weak':  'var(--mn-accent-weak)',
              'accent-text':  'var(--mn-accent-text)',
              danger:         'var(--mn-danger)',
              warn:           'var(--mn-warn)',
              success:        'var(--mn-success)',
              recording:      'var(--mn-recording)',
              seal:           'var(--mn-seal-red)',
              'seal-soft':    'var(--mn-seal-red-soft)',
            },
          },
          fontFamily: {
            mn:        ['var(--mn-font)'],
            'mn-mono': ['var(--mn-font-mono)'],
          },
          fontSize: {
            '2xs':  'var(--mn-text-2xs)',
            'mn-xs':'var(--mn-text-xs)',
            'mn-sm':'var(--mn-text-sm)',
            'mn':   'var(--mn-text-base)',
            'mn-lg':'var(--mn-text-lg)',
            'mn-xl':'var(--mn-text-xl)',
            'mn-2xl':'var(--mn-text-2xl)',
          },
          borderRadius: {
            'mn-sm': 'var(--mn-radius-sm)',
            'mn-md': 'var(--mn-radius-md)',
            'mn-lg': 'var(--mn-radius-lg)',
            'mn-xl': 'var(--mn-radius-xl)',
          },
          boxShadow: {
            'mn-sm':      'var(--mn-shadow-sm)',
            'mn-md':      'var(--mn-shadow-md)',
            'mn-popover': 'var(--mn-shadow-popover)',
          },
        },
      },
    }
  </script>
  <style>
    @keyframes pulse-recording { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .animate-pulse-recording { animation: pulse-recording 1.5s ease-in-out infinite; }
    audio::-webkit-media-controls-panel { background: transparent; }
    @keyframes chat-panel-in {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes chat-panel-out {
      from { opacity: 1; transform: scale(1); }
      to { opacity: 0; transform: scale(0.85); }
    }
    .chat-panel-enter { animation: chat-panel-in 0.2s ease-out forwards; }
    .chat-panel-exit { animation: chat-panel-out 0.15s ease-in forwards; }
    @keyframes mention-shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-3px); }
      40% { transform: translateX(3px); }
      60% { transform: translateX(-2px); }
      80% { transform: translateX(2px); }
    }
    .mention-shake { animation: mention-shake 0.3s ease-in-out; }
    @keyframes chat-tooltip-in {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .chat-tooltip-enter { animation: chat-tooltip-in 0.3s ease-out forwards; }
    @keyframes dot-breathe { 0%, 100% { opacity: 0.25; } 50% { opacity: 1; } }
    .dot-loading span { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: dot-breathe 1.6s ease-in-out infinite; }
    .dot-loading span:nth-child(2) { animation-delay: 0.3s; }
    .dot-loading span:nth-child(3) { animation-delay: 0.6s; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .sidebar-scroll::-webkit-scrollbar { width: 4px; }
    .sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
    .sidebar-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
    @media (prefers-color-scheme: dark) {
      .sidebar-scroll::-webkit-scrollbar-thumb { background: #374151; }
    }
  </style>
</head>
<body class="h-full bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 antialiased overflow-hidden">
  <div id="root" class="h-full">
    <div id="loading" class="flex items-center justify-center h-full text-gray-400 dark:text-gray-600 text-sm">Loading libraries from esm.sh&hellip;</div>
  </div>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@19",
        "react-dom/client": "https://esm.sh/react-dom@19/client",
        "react/jsx-runtime": "https://esm.sh/react@19/jsx-runtime",
        "marked": "https://esm.sh/marked"
      }
    }
  </script>
  <!-- Loaded before app.mjs so window.__mn is in place when components mount.
       No-op in a regular browser — falls through to fetch(). -->
  <script type="module" src="/tauri-bridge.mjs"></script>
  <script type="module" src="/app.mjs"></script>
</body>
</html>
